<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Futuristic Tentara</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
        * { font-family: 'Space Grotesk', sans-serif; }
        .mono { font-family: 'Space Mono', monospace; }
        .brutal-shadow { box-shadow: 5px 5px 0px 0px #000; }
        .brutal-shadow-sm { box-shadow: 3px 3px 0px 0px #000; }
        .brutal-shadow-lg { box-shadow: 8px 8px 0px 0px #000; }

        @keyframes bounceIn {
            0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
            50% { transform: scale(1.1) rotate(3deg); }
            70% { transform: scale(0.95) rotate(-2deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

        .anim-bounce { animation: bounceIn 0.5s ease forwards; }
        .anim-slide { animation: slideUp 0.4s ease forwards; }
        .anim-delay-1 { animation-delay: 0.05s; opacity: 0; }
        .anim-delay-2 { animation-delay: 0.1s; opacity: 0; }
        .anim-delay-3 { animation-delay: 0.15s; opacity: 0; }
        .anim-delay-4 { animation-delay: 0.2s; opacity: 0; }

        .menu-btn:active { transform: translate(3px,3px); box-shadow: none !important; }
        .menu-btn { transition: all 0.1s; }

        /* ===== LOADING SCREEN BIRU KUNING ===== */
        .loading-screen {
            position: fixed; inset: 0; z-index: 999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 16px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
            overflow: hidden;
        }
        .loading-screen.active { opacity: 1; pointer-events: all; }

        /* Gradient background animasi */
        .loading-bg {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, #1e3a8a, #1d4ed8, #0ea5e9, #1e3a8a);
            background-size: 400% 400%;
            animation: gradientShift 2s ease infinite;
        }
        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Grid garis militer */
        .loading-grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(251,191,36,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(251,191,36,0.08) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Bintang sudut */
        .corner-star {
            position: absolute;
            font-size: 32px;
            opacity: 0.3;
            animation: rotateStar 4s linear infinite;
        }
        .corner-star:nth-child(1) { top: 20px; left: 20px; }
        .corner-star:nth-child(2) { top: 20px; right: 20px; animation-direction: reverse; }
        .corner-star:nth-child(3) { bottom: 80px; left: 20px; animation-delay: 1s; }
        .corner-star:nth-child(4) { bottom: 80px; right: 20px; animation-delay: 2s; }
        @keyframes rotateStar { from { transform: rotate(0); } to { transform: rotate(360deg); } }

        /* Logo spinner tengah */
        .loading-ring-outer {
            position: relative; z-index: 2;
            width: 90px; height: 90px;
            border: 5px solid rgba(251,191,36,0.3);
            border-top: 5px solid #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-ring-inner {
            position: absolute; inset: 10px;
            border: 4px solid rgba(255,255,255,0.2);
            border-bottom: 4px solid #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite reverse;
        }
        .loading-icon-center {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-title {
            position: relative; z-index: 2;
            color: #fbbf24;
            font-family: 'Space Mono', monospace;
            font-weight: 700; font-size: 20px;
            letter-spacing: 0.12em; text-transform: uppercase;
            animation: textPulse 0.8s ease infinite;
            text-shadow: 0 0 20px rgba(251,191,36,0.6);
        }
        @keyframes textPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.97); }
        }

        .loading-sub {
            position: relative; z-index: 2;
            color: rgba(255,255,255,0.6);
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.2em; text-transform: uppercase;
        }

        .loading-dots {
            position: relative; z-index: 2;
            display: flex; gap: 8px;
        }
        .loading-dots span {
            width: 10px; height: 10px;
            background: #fbbf24;
            border-radius: 50%;
            border: 2px solid #000;
        }
        .loading-dots span:nth-child(1) { animation: dotBounce 0.9s ease infinite 0s; }
        .loading-dots span:nth-child(2) { animation: dotBounce 0.9s ease infinite 0.15s; }
        .loading-dots span:nth-child(3) { animation: dotBounce 0.9s ease infinite 0.3s; }
        @keyframes dotBounce {
            0%,100% { transform: translateY(0); background: #fbbf24; }
            50% { transform: translateY(-12px); background: #fff; }
        }

        /* Progress bar */
        .loading-bar-wrap {
            position: relative; z-index: 2;
            width: 200px; height: 8px;
            background: rgba(255,255,255,0.2);
            border: 2px solid #fbbf24;
        }
        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #fbbf24, #fff, #fbbf24);
            background-size: 200% 100%;
            animation: barSlide 1s ease infinite;
        }
        @keyframes barSlide {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 0%; }
        }

        /* Badge militer */
        .loading-badge {
            position: relative; z-index: 2;
            background: rgba(251,191,36,0.15);
            border: 2px solid #fbbf24;
            padding: 4px 12px;
            color: #fbbf24;
            font-size: 10px; font-weight: 700;
            letter-spacing: 0.15em; text-transform: uppercase;
        }
    </style>
</head>
<body class="bg-[#dbeafe] min-h-screen pb-24">

    <!-- LOADING SCREEN -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-bg"></div>
        <div class="loading-grid"></div>
        <span class="corner-star">⭐</span>
        <span class="corner-star">⭐</span>
        <span class="corner-star">⭐</span>
        <span class="corner-star">⭐</span>
        <div class="loading-badge">FUTURISTIC TENTARA MDT</div>
        <div class="loading-ring-outer">
            <div class="loading-ring-inner"></div>
            <div class="loading-icon-center">🎖️</div>
        </div>
        <p class="loading-title">Sabar lagi loading...</p>
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <div class="loading-bar-wrap"><div class="loading-bar-fill"></div></div>
        <p class="loading-sub">Memuat halaman</p>
    </div>

    <!-- TOP BAR -->
    <div class="bg-yellow-400 border-b-4 border-black px-4 py-3 flex justify-between items-center sticky top-0 z-30">
        <div class="flex items-center gap-2">
            <span class="mono font-bold text-xs">MDT v2.1</span>
            <div class="w-2 h-2 bg-green-500 border-2 border-black rounded-full animate-pulse"></div>
            <span class="text-[10px] font-bold text-green-700">ONLINE</span>
        </div>
        <span class="mono font-black text-xs tracking-wider">FUTURISTIC_ONTOP</span>
    </div>

    <!-- PROFILE CARD -->
    <div class="mx-4 mt-4 bg-white border-4 border-black brutal-shadow-lg p-4 flex items-center gap-4 anim-slide">
        <div class="relative">
            <div class="w-16 h-16 border-4 border-black bg-purple-200 overflow-hidden brutal-shadow">
                <img id="userAvatar" src="https://via.placeholder.com/64" alt="Avatar" class="w-full h-full object-cover">
            </div>
            <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-green-400 border-2 border-black rounded-full"></div>
        </div>
        <div class="flex-1">
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Selamat datang,</p>
            <h2 id="userName" class="text-lg font-black leading-tight">Loading...</h2>
            <p id="userEmail" class="text-[11px] text-gray-500 font-medium">--</p>
        </div>
        <button onclick="handleLogout()" class="bg-red-400 px-3 py-2 text-[10px] font-black uppercase brutal-shadow-sm menu-btn" style="border:3px solid #000;">KELUAR</button>
    </div>

    <!-- QUICK STATUS -->
    <div class="mx-4 mt-3 grid grid-cols-3 gap-2">
        <div class="bg-cyan-300 border-4 border-black p-3 text-center brutal-shadow anim-slide anim-delay-1">
            <div class="text-2xl">📋</div>
            <div class="text-[10px] font-black uppercase mt-1">Laporan</div>
        </div>
        <div class="bg-green-300 border-4 border-black p-3 text-center brutal-shadow anim-slide anim-delay-2">
            <div class="text-2xl">🚔</div>
            <div class="text-[10px] font-black uppercase mt-1">Patroli</div>
        </div>
        <div class="bg-pink-300 border-4 border-black p-3 text-center brutal-shadow anim-slide anim-delay-3">
            <div class="text-2xl">🏖️</div>
            <div class="text-[10px] font-black uppercase mt-1">Cuti</div>
        </div>
    </div>

    <!-- MAIN MENU CARDS -->
    <div class="mx-4 mt-4 grid grid-cols-2 gap-3">
        <button onclick="goTo('laporan-duty.html')" class="menu-btn bg-blue-400 border-4 border-black p-4 text-left brutal-shadow anim-slide anim-delay-2">
            <div class="text-3xl mb-2">📝</div>
            <div class="font-black text-sm uppercase leading-tight">Laporan Duty</div>
            <div class="text-[10px] font-medium mt-1 opacity-70">Laporan kegiatan harian</div>
        </button>
        <button onclick="goTo('laporan-patroli.html')" class="menu-btn bg-orange-400 border-4 border-black p-4 text-left brutal-shadow anim-slide anim-delay-3">
            <div class="text-3xl mb-2">🚨</div>
            <div class="font-black text-sm uppercase leading-tight">Patroli Rutin</div>
            <div class="text-[10px] font-medium mt-1 opacity-70">Laporan patroli wilayah</div>
        </button>
    </div>

    <!-- IZIN CUTI -->
    <div class="mx-4 mt-3">
        <button onclick="goTo('izin-cuti.html')" class="menu-btn w-full bg-pink-400 border-4 border-black p-4 text-center brutal-shadow anim-slide anim-delay-4">
            <div class="text-3xl mb-1 inline-block">🏖️</div>
            <div class="font-black text-base uppercase">Izin Cuti</div>
            <div class="text-[11px] font-medium opacity-70">Pengajuan izin & cuti</div>
        </button>
    </div>

    <!-- BOTTOM NAV -->
    <div class="fixed bottom-0 left-0 right-0 bg-black border-t-4 border-yellow-400 flex justify-between px-6 py-2 z-40">
        <button onclick="goTo('menu.html')" class="flex flex-col items-center gap-1 text-white menu-btn">
            <span class="text-xl">☰</span>
            <span class="text-[9px] font-black uppercase tracking-wider text-yellow-400">MENU</span>
        </button>
        <div class="flex items-center">
            <span class="text-yellow-400 mono text-[10px] font-bold">◆ AKTIF ◆</span>
        </div>
        <button onclick="goTo('gaji.html')" class="flex flex-col items-center gap-1 text-white menu-btn">
            <span class="text-xl">💰</span>
            <span class="text-[9px] font-black uppercase tracking-wider text-yellow-400">GAJI</span>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://iejyusqakqrcavzbscqz.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imllanl1c3Fha3FyY2F2emJzY3F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NjQ2OTgsImV4cCI6MjA5NjM0MDY5OH0._z6Owi73t6G8h4He4Vmglgz4gV0eJlIyq9j6dZMAGtM";
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function goTo(page) {
            const ls = document.getElementById('loadingScreen');
            ls.classList.add('active');
            setTimeout(() => { window.location.href = page; }, 1400);
        }

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            const { data: { user } } = await supabaseClient.auth.getUser();
            const u = user || session.user;
            const meta = u.user_metadata || {};
            const identities = u.identities || [];
            const disc = (identities.find(i => i.provider === 'discord') || {}).identity_data || {};
            const name = meta.full_name || meta.name || meta.global_name || meta.user_name || disc.full_name || disc.global_name || u.email?.split('@')[0] || 'Anggota';
            const avatarHash = meta.avatar_hash || disc.avatar_hash;
            const discordId = meta.provider_id || disc.sub;
            let avatar = meta.avatar_url || disc.avatar_url || 'https://via.placeholder.com/64';
            if (avatarHash && discordId) avatar = `https://cdn.discordapp.com/avatars/${discordId}/${avatarHash}.png?size=128`;
            document.getElementById('userName').textContent = name;
            document.getElementById('userEmail').textContent = u.email || '';
            const img = document.getElementById('userAvatar');
            img.src = avatar;
            img.onerror = () => img.src = 'https://via.placeholder.com/64';
            localStorage.setItem('mdt_user', JSON.stringify({ name, avatar, email: u.email }));
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            localStorage.removeItem('mdt_user');
            window.location.href = 'index.html';
        }

        init();
    </script>
</body>
</html>
