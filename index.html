<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Futuristic Tentara</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

        * { font-family: 'Space Grotesk', sans-serif; }
        .mono { font-family: 'Space Mono', monospace; }

        .brutal-shadow { box-shadow: 5px 5px 0px 0px #000; }
        .brutal-shadow-sm { box-shadow: 3px 3px 0px 0px #000; }
        .brutal-shadow-lg { box-shadow: 8px 8px 0px 0px #000; }

        /* Slide-in animation for panels */
        .panel-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .panel-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .panel-slide {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #fafafa;
            border-top: 4px solid #000;
            border-radius: 0;
            z-index: 51;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 90vh;
            overflow-y: auto;
        }
        .panel-slide.active {
            transform: translateY(0);
        }

        /* Bounce animation for icons */
        @keyframes bounceIn {
            0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
            50% { transform: scale(1.1) rotate(3deg); }
            70% { transform: scale(0.95) rotate(-2deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        .anim-bounce { animation: bounceIn 0.5s ease forwards; }
        .anim-slide { animation: slideUp 0.4s ease forwards; }
        .anim-delay-1 { animation-delay: 0.05s; opacity: 0; }
        .anim-delay-2 { animation-delay: 0.1s; opacity: 0; }
        .anim-delay-3 { animation-delay: 0.15s; opacity: 0; }
        .anim-delay-4 { animation-delay: 0.2s; opacity: 0; }
        .anim-delay-5 { animation-delay: 0.25s; opacity: 0; }

        .menu-btn:active { transform: translate(3px, 3px); box-shadow: none !important; }
        .menu-btn { transition: all 0.1s; }

        /* Photo preview */
        .photo-slot {
            width: 80px; height: 80px;
            border: 3px solid #000;
            background: #e5e7eb;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
        }
        .photo-slot:hover { background: #d1d5db; transform: scale(1.05); }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }

        /* Bottom nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #000;
            border-top: 4px solid #fbbf24;
            display: flex; justify-content: space-between;
            padding: 8px 24px;
            z-index: 40;
        }

        /* Status bar */
        .status-badge {
            animation: fadeIn 0.5s ease;
        }

        /* Tab active */
        .tab-active {
            background: #000 !important;
            color: #fff !important;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #000; }

        .input-field {
            width: 100%;
            border: 3px solid #000;
            padding: 10px 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 14px;
            background: #fff;
            outline: none;
            transition: box-shadow 0.2s;
        }
        .input-field:focus {
            box-shadow: 4px 4px 0px 0px #5865F2;
        }

        .label-field {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            display: block;
        }

        .submit-btn {
            width: 100%;
            background: #000;
            color: #fff;
            border: 3px solid #000;
            padding: 14px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px 0px #5865F2;
        }
        .submit-btn:active { transform: translate(4px,4px); box-shadow: none; }

        .panel-header {
            position: sticky; top: 0;
            background: #000;
            color: #fff;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #fbbf24;
            z-index: 2;
        }
    </style>
</head>
<body class="bg-[#dbeafe] min-h-screen pb-24">

    <!-- TOP BAR -->
    <div class="bg-yellow-400 border-b-4 border-black px-4 py-3 flex justify-between items-center sticky top-0 z-30">
        <div class="flex items-center gap-2">
            <span class="mono font-bold text-xs">MDT v2.1</span>
            <div class="w-2 h-2 bg-green-500 border-2 border-black rounded-full animate-pulse"></div>
            <span class="text-[10px] font-bold text-green-700">ONLINE</span>
        </div>
        <span class="mono font-black text-xs tracking-wider">FUTURISTIC_ONTOP</span>
    </div>

    <!-- PROFILE CARD -->
    <div class="mx-4 mt-4 bg-white border-4 border-black brutal-shadow-lg p-4 flex items-center gap-4 anim-slide">
        <div class="relative">
            <div id="avatarContainer" class="w-16 h-16 border-4 border-black bg-purple-200 overflow-hidden brutal-shadow">
                <img id="userAvatar" src="https://via.placeholder.com/64" alt="Avatar" class="w-full h-full object-cover">
            </div>
            <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-green-400 border-2 border-black rounded-full"></div>
        </div>
        <div class="flex-1">
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Selamat datang,</p>
            <h2 id="userName" class="text-lg font-black leading-tight">Loading...</h2>
            <p id="userEmail" class="text-[11px] text-gray-500 font-medium">--</p>
        </div>
        <button onclick="handleLogout()" class="bg-red-400 border-3 border-black px-3 py-2 text-[10px] font-black uppercase brutal-shadow-sm menu-btn" style="border:3px solid #000;">KELUAR</button>
    </div>

    <!-- QUICK STATUS -->
    <div class="mx-4 mt-3 grid grid-cols-3 gap-2">
        <div class="bg-cyan-300 border-4 border-black p-3 text-center brutal-shadow anim-slide anim-delay-1">
            <div class="text-2xl">📋</div>
            <div class="text-[10px] font-black uppercase mt-1">Laporan</div>
        </div>
        <div class="bg-green-300 border-4 border-black p-3 text-center brutal-shadow anim-slide anim-delay-2">
            <div class="text-2xl">🚔</div>
            <div class="text-[10px] font-black uppercase mt-1">Patroli</div>
        </div>
        <div class="bg-pink-300 border-4 border-black p-3 text-center brutal-shadow anim-slide anim-delay-3">
            <div class="text-2xl">🏖️</div>
            <div class="text-[10px] font-black uppercase mt-1">Cuti</div>
        </div>
    </div>

    <!-- MAIN MENU CARDS -->
    <div class="mx-4 mt-4 grid grid-cols-2 gap-3">
        <!-- Laporan Duty -->
        <button onclick="openPanel('duty')" class="menu-btn bg-blue-400 border-4 border-black p-4 text-left brutal-shadow anim-slide anim-delay-2">
            <div class="text-3xl mb-2 anim-bounce">📝</div>
            <div class="font-black text-sm uppercase leading-tight">Laporan Duty</div>
            <div class="text-[10px] font-medium mt-1 opacity-70">Laporan kegiatan harian</div>
        </button>
        <!-- Laporan Patroli -->
        <button onclick="openPanel('patroli')" class="menu-btn bg-orange-400 border-4 border-black p-4 text-left brutal-shadow anim-slide anim-delay-3">
            <div class="text-3xl mb-2 anim-bounce anim-delay-1">🚨</div>
            <div class="font-black text-sm uppercase leading-tight">Patroli Rutin</div>
            <div class="text-[10px] font-medium mt-1 opacity-70">Laporan patroli wilayah</div>
        </button>
    </div>

    <!-- IZIN CUTI - CENTER -->
    <div class="mx-4 mt-3">
        <button onclick="openPanel('cuti')" class="menu-btn w-full bg-pink-400 border-4 border-black p-4 text-center brutal-shadow anim-slide anim-delay-4">
            <div class="text-3xl mb-1 inline-block anim-bounce anim-delay-2">🏖️</div>
            <div class="font-black text-base uppercase">Izin Cuti</div>
            <div class="text-[11px] font-medium opacity-70">Pengajuan izin & cuti</div>
        </button>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <button onclick="openPanel('menu')" class="flex flex-col items-center gap-1 text-white menu-btn">
            <span class="text-xl">☰</span>
            <span class="text-[9px] font-black uppercase tracking-wider text-yellow-400">MENU</span>
        </button>
        <div class="flex items-center">
            <span class="text-yellow-400 mono text-[10px] font-bold">◆ AKTIF ◆</span>
        </div>
        <button onclick="openPanel('gaji')" class="flex flex-col items-center gap-1 text-white menu-btn">
            <span class="text-xl">💰</span>
            <span class="text-[9px] font-black uppercase tracking-wider text-yellow-400">GAJI</span>
        </button>
    </div>

    <!-- OVERLAY -->
    <div id="overlay" class="panel-overlay" onclick="closeAllPanels()"></div>

    <!-- ===== PANEL: LAPORAN DUTY ===== -->
    <div id="panel-duty" class="panel-slide">
        <div class="panel-header">
            <span class="font-black text-sm uppercase tracking-wider">📝 Laporan Duty</span>
            <button onclick="closeAllPanels()" class="text-yellow-400 font-black text-lg">✕</button>
        </div>
        <div class="p-5 space-y-4">
            <div class="anim-slide anim-delay-1">
                <label class="label-field">Nama Anggota</label>
                <input type="text" id="duty-nama" class="input-field" placeholder="Otomatis dari akun..." readonly>
            </div>
            <div class="anim-slide anim-delay-2">
                <label class="label-field">Pangkat</label>
                <input type="text" id="duty-pangkat" class="input-field" placeholder="Masukkan pangkat...">
            </div>
            <div class="grid grid-cols-2 gap-3 anim-slide anim-delay-3">
                <div>
                    <label class="label-field">Jam Awal Duty</label>
                    <input type="time" id="duty-jamAwal" class="input-field">
                </div>
                <div>
                    <label class="label-field">Jam Akhir Duty</label>
                    <input type="time" id="duty-jamAkhir" class="input-field">
                </div>
            </div>
            <div class="anim-slide anim-delay-4">
                <label class="label-field">Penjelasan Kegiatan Duty</label>
                <textarea id="duty-kegiatan" class="input-field" rows="4" placeholder="Tuliskan kegiatan selama duty..."></textarea>
            </div>
            <div class="anim-slide anim-delay-5">
                <label class="label-field">Upload Foto Kegiatan (Maks. 3 Foto)</label>
                <div class="flex gap-3 mt-2">
                    <div class="photo-slot brutal-shadow-sm" onclick="triggerUpload('duty-foto', 0)" id="duty-slot-0">📷</div>
                    <div class="photo-slot brutal-shadow-sm" onclick="triggerUpload('duty-foto', 1)" id="duty-slot-1">📷</div>
                    <div class="photo-slot brutal-shadow-sm" onclick="triggerUpload('duty-foto', 2)" id="duty-slot-2">📷</div>
                </div>
                <input type="file" id="duty-foto" accept="image/*" class="hidden" onchange="previewPhoto(this, 'duty')">
            </div>
            <button onclick="submitForm('duty')" class="submit-btn anim-slide anim-delay-5">
                KIRIM LAPORAN DUTY →
            </button>
        </div>
    </div>

    <!-- ===== PANEL: LAPORAN PATROLI ===== -->
    <div id="panel-patroli" class="panel-slide">
        <div class="panel-header" style="background:#ea580c;">
            <span class="font-black text-sm uppercase tracking-wider">🚨 Laporan Patroli Rutin</span>
            <button onclick="closeAllPanels()" class="text-yellow-400 font-black text-lg">✕</button>
        </div>
        <div class="p-5 space-y-4">
            <div class="anim-slide anim-delay-1">
                <label class="label-field">Nama Anggota</label>
                <input type="text" id="patroli-nama" class="input-field" placeholder="Otomatis dari akun..." readonly>
            </div>
            <div class="anim-slide anim-delay-2">
                <label class="label-field">Pangkat</label>
                <input type="text" id="patroli-pangkat" class="input-field" placeholder="Masukkan pangkat...">
            </div>
            <div class="anim-slide anim-delay-3">
                <label class="label-field">Waktu Patroli</label>
                <div class="grid grid-cols-4 gap-2 mt-1">
                    <button onclick="selectWaktu(this, 'pagi')" class="waktu-btn border-3 border-black py-2 text-xs font-black bg-yellow-200 brutal-shadow-sm menu-btn" style="border:3px solid #000;">🌅 PAGI</button>
                    <button onclick="selectWaktu(this, 'siang')" class="waktu-btn border-3 border-black py-2 text-xs font-black bg-orange-200 brutal-shadow-sm menu-btn" style="border:3px solid #000;">☀️ SIANG</button>
                    <button onclick="selectWaktu(this, 'sore')" class="waktu-btn border-3 border-black py-2 text-xs font-black bg-purple-200 brutal-shadow-sm menu-btn" style="border:3px solid #000;">🌆 SORE</button>
                    <button onclick="selectWaktu(this, 'malam')" class="waktu-btn border-3 border-black py-2 text-xs font-black bg-blue-200 brutal-shadow-sm menu-btn" style="border:3px solid #000;">🌙 MALAM</button>
                </div>
                <input type="hidden" id="patroli-waktu" value="">
            </div>
            <div class="anim-slide anim-delay-4">
                <label class="label-field">Kegiatan Patroli</label>
                <textarea id="patroli-kegiatan" class="input-field" rows="4" placeholder="Tuliskan kegiatan patroli..."></textarea>
            </div>
            <div class="anim-slide anim-delay-5">
                <label class="label-field">Upload Foto (Maks. 2 Foto)</label>
                <div class="flex gap-3 mt-2">
                    <div class="photo-slot brutal-shadow-sm" onclick="triggerUpload('patroli-foto', 0)" id="patroli-slot-0">📷</div>
                    <div class="photo-slot brutal-shadow-sm" onclick="triggerUpload('patroli-foto', 1)" id="patroli-slot-1">📷</div>
                </div>
                <input type="file" id="patroli-foto" accept="image/*" class="hidden" onchange="previewPhoto(this, 'patroli')">
            </div>
            <button onclick="submitForm('patroli')" class="submit-btn anim-slide anim-delay-5" style="box-shadow:4px 4px 0px 0px #ea580c;">
                KIRIM LAPORAN PATROLI →
            </button>
        </div>
    </div>

    <!-- ===== PANEL: IZIN CUTI ===== -->
    <div id="panel-cuti" class="panel-slide">
        <div class="panel-header" style="background:#db2777;">
            <span class="font-black text-sm uppercase tracking-wider">🏖️ Izin Cuti</span>
            <button onclick="closeAllPanels()" class="text-yellow-400 font-black text-lg">✕</button>
        </div>
        <div class="p-5 space-y-4">
            <div class="anim-slide anim-delay-1">
                <label class="label-field">Nama Anggota</label>
                <input type="text" id="cuti-nama" class="input-field" placeholder="Otomatis dari akun..." readonly>
            </div>
            <div class="anim-slide anim-delay-2">
                <label class="label-field">Pangkat</label>
                <input type="text" id="cuti-pangkat" class="input-field" placeholder="Masukkan pangkat...">
            </div>
            <div class="grid grid-cols-2 gap-3 anim-slide anim-delay-3">
                <div>
                    <label class="label-field">Tanggal Mulai Cuti</label>
                    <input type="date" id="cuti-mulai" class="input-field">
                </div>
                <div>
                    <label class="label-field">Tanggal Berakhir Cuti</label>
                    <input type="date" id="cuti-akhir" class="input-field">
                </div>
            </div>
            <div class="anim-slide anim-delay-4">
                <label class="label-field">Alasan Cuti</label>
                <textarea id="cuti-alasan" class="input-field" rows="4" placeholder="Tuliskan alasan pengajuan cuti..."></textarea>
            </div>
            <button onclick="submitForm('cuti')" class="submit-btn anim-slide anim-delay-5" style="box-shadow:4px 4px 0px 0px #db2777;">
                AJUKAN IZIN CUTI →
            </button>
        </div>
    </div>

    <!-- ===== PANEL: MENU ===== -->
    <div id="panel-menu" class="panel-slide">
        <div class="panel-header">
            <span class="font-black text-sm uppercase tracking-wider">☰ Menu Utama</span>
            <button onclick="closeAllPanels()" class="text-yellow-400 font-black text-lg">✕</button>
        </div>
        <div class="p-5 space-y-3">
            <button onclick="switchPanel('duty')" class="menu-btn w-full bg-blue-400 border-4 border-black p-4 text-left brutal-shadow flex items-center gap-4 anim-slide anim-delay-1">
                <span class="text-3xl">📝</span>
                <div>
                    <div class="font-black uppercase">Laporan Duty</div>
                    <div class="text-xs opacity-70">Laporan kegiatan harian anggota</div>
                </div>
                <span class="ml-auto font-black">→</span>
            </button>
            <button onclick="switchPanel('patroli')" class="menu-btn w-full bg-orange-400 border-4 border-black p-4 text-left brutal-shadow flex items-center gap-4 anim-slide anim-delay-2">
                <span class="text-3xl">🚨</span>
                <div>
                    <div class="font-black uppercase">Laporan Patroli</div>
                    <div class="text-xs opacity-70">Laporan patroli rutin wilayah</div>
                </div>
                <span class="ml-auto font-black">→</span>
            </button>
            <button onclick="switchPanel('cuti')" class="menu-btn w-full bg-pink-400 border-4 border-black p-4 text-left brutal-shadow flex items-center gap-4 anim-slide anim-delay-3">
                <span class="text-3xl">🏖️</span>
                <div>
                    <div class="font-black uppercase">Izin Cuti</div>
                    <div class="text-xs opacity-70">Pengajuan izin dan cuti</div>
                </div>
                <span class="ml-auto font-black">→</span>
